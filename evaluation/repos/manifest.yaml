# Repository Manifest
# Each entry records a repository selected for evaluation with a fixed commit SHA.
# Repositories are cloned into evaluation/workspaces/ (not committed to Git).
#
# Status values:
#   candidate   - Proposed but not yet selected
#   selected    - Selected for a specific split
#   cloned      - Cloned locally at the specified commit
#   indexed     - Scanned and vector-indexed by ResearchCode-Agent
#
# Field conventions:
#   clone_url          - Git URL suitable for `git clone` (never a subdirectory URL)
#   repository_subdir  - Non-empty when the usable project lives in a subdirectory
#                        of a larger monorepo; empty string otherwise
#   exclusion_reason    - Null for active candidates; reason string if excluded
#   verified           - True once the repo has been cloned and fields confirmed
#   file_count_*       - Estimated file counts; always unverified until clone
#   file_counts_verified - Whether file counts have been confirmed post-clone
#
# Usage:
#   python scripts/clone_repos.py  # Clones all 'selected' repos at fixed SHA

